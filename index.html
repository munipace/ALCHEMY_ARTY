<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>ALCHEMY ARTY</title>
<style>
:root{
  --bg:#efefec;
  --paper:#fafaf7;
  --panel:rgba(250,250,247,.93);
  --panel-strong:#f5f5f1;
  --line:#d7d8d3;
  --line-strong:#c6c9c3;
  --text:#454844;
  --muted:#7c817b;
  --soft:#e8e9e4;
  --accent:#626b65;
  --danger:#8b625e;
  --shadow:0 18px 48px rgba(45,49,45,.09);
  --radius:22px;
}
*{box-sizing:border-box}
html,body{min-height:100%}
body{
  margin:0;color:var(--text);
  background:
    radial-gradient(circle at 8% -10%,rgba(255,255,255,.96),transparent 31%),
    radial-gradient(circle at 100% 12%,rgba(213,217,211,.50),transparent 28%),
    linear-gradient(180deg,#f7f7f4 0%,var(--bg) 100%);
  font-family:ui-rounded,"Hiragino Maru Gothic ProN","Yu Gothic",system-ui,sans-serif;
}
button,input{font:inherit} button{color:inherit}
.app{width:min(1360px,100%);margin:0 auto;padding:18px}
.topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;padding:7px 4px 17px}
.brand h1{margin:0;font-family:"Iowan Old Style","Palatino Linotype",Georgia,"Yu Mincho",serif;font-style:italic;font-weight:500;font-size:clamp(31px,5vw,52px);letter-spacing:.16em}
.brand p{margin:5px 0 0;color:var(--muted);font-size:12px;letter-spacing:.08em}
.status-pill{display:flex;align-items:center;gap:7px;padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,252,.72);font-size:12px;color:var(--muted)}
.status-dot{width:7px;height:7px;border-radius:50%;background:#829187;box-shadow:0 0 0 4px rgba(130,145,135,.1)}
.layout{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(300px,.65fr);gap:14px;align-items:start}
.card{border:1px solid rgba(255,255,255,.9);background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);backdrop-filter:blur(14px);overflow:hidden}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 17px 0}
.card-head h2{font-size:16px;margin:0}.card-head p{font-size:11px;color:var(--muted);margin:4px 0 0;line-height:1.55}
.workshop{padding:0 14px 14px}
.mode-row{display:grid;grid-template-columns:auto minmax(280px,1fr) auto;align-items:center;gap:8px;margin:10px 0 8px;padding:7px;border:1px solid var(--line);border-radius:15px;background:rgba(255,255,255,.62)}
.mode-switch{display:flex;padding:3px;border:1px solid var(--line);border-radius:13px;background:var(--panel-strong)}
.mode-btn{border:0;background:transparent;border-radius:10px;padding:8px 12px;font-size:11px;color:var(--muted);cursor:pointer}
.mode-btn.active{background:#fff;color:var(--text);box-shadow:0 3px 9px rgba(45,49,45,.08)}
.placement-status{font-size:9px;color:var(--muted);text-align:right;line-height:1.35;max-width:180px}
.colors{display:grid;grid-template-columns:repeat(3,minmax(86px,1fr));gap:5px;margin:0}
.color-control{display:flex;align-items:center;gap:6px;padding:5px 7px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.66);min-width:0}
.color-control span{font-size:8px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.color-control strong{display:block;font-size:9px;color:var(--text)}
.color-control input{width:23px;height:23px;border:0;padding:0;background:none;border-radius:50%;overflow:hidden;cursor:pointer;flex:0 0 auto}
.color-control input::-webkit-color-swatch-wrapper{padding:0}.color-control input::-webkit-color-swatch{border:1px solid rgba(50,50,50,.14);border-radius:50%}
.stage-info{position:absolute;left:10px;right:10px;top:9px;z-index:6;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:8px 10px;border-radius:13px;background:rgba(253,253,249,.80);border:1px solid rgba(205,207,202,.72);backdrop-filter:blur(8px);pointer-events:none}
.stage-info h3{margin:0;font-size:13px}.stage-info p{margin:2px 0 0;font-size:9px;color:var(--muted);line-height:1.4}
.step-badge{padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px;color:var(--muted);white-space:nowrap;background:#fff}
.canvas-wrap{
  position:relative;width:min(100%,760px);height:auto;aspect-ratio:1 / 1;margin:0 auto;border-radius:19px;overflow:hidden;touch-action:none;
  border:1px solid var(--line-strong);
  background:
    linear-gradient(rgba(85,90,85,.045) 1px,transparent 1px),
    linear-gradient(90deg,rgba(85,90,85,.045) 1px,transparent 1px),
    radial-gradient(circle at center,#fdfdf9 0%,#f7f7f3 58%,#e9ebe6 100%);
  background-size:30px 30px,30px 30px,auto;
}
.canvas-wrap.placement-mode{cursor:crosshair}.canvas-wrap.drawing-mode{cursor:crosshair}
.canvas-wrap canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
.ingredient-layer{position:absolute;inset:0;pointer-events:none;z-index:3;transition:.35s opacity,.35s filter}
.ingredient-layer.result-visible{opacity:.18;filter:grayscale(.35)}
.placed-material{position:absolute;transform:translate(-50%,-50%);width:56px;height:56px;pointer-events:auto;cursor:grab;touch-action:none}
.placed-material:active{cursor:grabbing}
.placed-material .object{position:absolute;inset:7px;border-radius:51% 49% 43% 57% / 49% 43% 57% 51%;box-shadow:inset -7px -8px 12px rgba(45,49,45,.12),0 5px 10px rgba(45,49,45,.09);border:1px solid rgba(65,70,65,.12)}
.placed-material.stone .object{background:linear-gradient(145deg,#e3e4df,#aeb2ab)}
.placed-material.sample .object{inset:3px;border:0;background:transparent!important;box-shadow:none;display:grid;place-items:center}.placed-material.sample .object svg{width:100%;height:100%;display:block;overflow:visible;filter:drop-shadow(0 3px 5px rgba(45,49,45,.12))}
.placed-remove{position:absolute;right:-2px;top:-2px;width:18px;height:18px;border-radius:50%;border:1px solid var(--line-strong);background:rgba(255,255,255,.94);font-size:12px;line-height:15px;padding:0;cursor:pointer;color:#737872}
.material-index{position:absolute;left:50%;bottom:-8px;transform:translateX(-50%);font-size:8px;padding:2px 5px;border-radius:999px;background:rgba(255,255,255,.88);border:1px solid var(--line);white-space:nowrap;color:var(--muted)}
.canvas-empty{position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:26px;color:var(--muted);font-size:11px;line-height:1.7;pointer-events:none;z-index:2}
.canvas-empty[hidden]{display:none}
.controls{position:absolute;left:50%;bottom:12px;z-index:7;transform:translateX(-50%);display:flex;gap:7px;flex-wrap:nowrap;margin:0;padding:6px;border-radius:15px;background:rgba(250,250,247,.86);border:1px solid rgba(203,205,200,.78);backdrop-filter:blur(9px)}
.btn{border:1px solid var(--line);background:#fff;border-radius:13px;padding:10px 13px;cursor:pointer;box-shadow:0 5px 14px rgba(50,55,50,.06);transition:.16s transform,.16s opacity,.16s background}
.btn:hover{transform:translateY(-1px)}.btn:disabled{opacity:.38;cursor:not-allowed;transform:none}
.btn.primary{background:#565f59;color:white;border-color:#565f59}.btn.ghost{background:transparent;box-shadow:none}.btn.danger{color:var(--danger)}
.microcopy{font-size:9px;color:var(--muted);line-height:1.45;margin:7px 2px 0}
.sidebar{display:grid;gap:14px}
.inventory{margin-top:9px;padding-bottom:10px;border:1px solid var(--line);border-radius:17px;background:rgba(248,248,244,.76);box-shadow:none}.inventory-toolbar{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 15px 8px}.inventory-count{font-size:11px;color:var(--muted)}
.inventory-grid{display:grid;grid-template-columns:repeat(7,minmax(72px,1fr));gap:7px;padding:0 10px 2px;max-height:190px;overflow:auto}
.inventory-slot{position:relative;min-width:0;aspect-ratio:1/1;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.66);padding:7px;cursor:grab;user-select:none;transition:.15s transform,.15s border-color,.15s background}
.inventory-slot:hover{transform:translateY(-1px);border-color:#b8bcb6}.inventory-slot.armed{outline:2px solid rgba(98,107,101,.26);background:#fff}.inventory-slot:active{cursor:grabbing}
.inventory-icon{height:55%;display:grid;place-items:center;position:relative}
.inventory-stone{width:38px;height:32px;border-radius:47% 53% 43% 57% / 54% 45% 55% 46%;background:linear-gradient(145deg,#e4e5df,#aaafa8);box-shadow:inset -6px -7px 10px rgba(62,68,62,.12)}
.inventory-sample{width:46px;height:46px;display:grid;place-items:center}.inventory-sample svg{width:100%;height:100%;display:block;overflow:visible;filter:drop-shadow(0 2px 3px rgba(45,49,45,.10))}
.inventory-name{font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;margin-top:3px}.inventory-meta{font-size:8px;color:var(--muted);text-align:center;margin-top:2px}
.inventory-info{position:absolute;right:4px;top:4px;width:18px;height:18px;border-radius:50%;border:1px solid var(--line);background:rgba(255,255,255,.88);font-size:10px;padding:0;cursor:pointer;color:var(--muted)}
.inventory-empty{grid-column:1/-1;padding:14px;border:1px dashed var(--line-strong);border-radius:13px;font-size:10px;line-height:1.6;color:var(--muted)}
.observer{padding-bottom:14px}.observer-copy{padding:13px 16px 0}.observer-name-row{display:flex;align-items:center;justify-content:space-between;gap:10px}.observer-name{font-size:20px;font-weight:800}.classification{font-size:10px;padding:5px 8px;border:1px solid var(--line);border-radius:999px;color:var(--muted);white-space:nowrap}
.observations{display:grid;gap:6px;margin-top:10px}.observation{font-size:11px;line-height:1.55;padding:8px 10px;border-radius:11px;background:#f4f4f0;border:1px solid #e1e2dd}.observation.locked{color:#a1a49f;background:transparent;border-style:dashed}
.observer-actions{display:flex;gap:8px;padding:11px 16px 0;flex-wrap:wrap}
.notebook{padding:14px 16px}.notebook h2{font-size:15px;margin:0 0 9px}.notebook-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.notebook-stat{padding:9px;border-radius:12px;background:#f3f3ef;border:1px solid #e2e3de}.notebook-stat strong{display:block;font-size:17px}.notebook-stat span{font-size:9px;color:var(--muted)}
.route-note{margin-top:10px;padding:10px;border:1px dashed var(--line-strong);border-radius:13px;font-size:10px;line-height:1.6;color:var(--muted)}
.toast{position:fixed;left:50%;bottom:calc(20px + env(safe-area-inset-bottom));transform:translate(-50%,15px);opacity:0;pointer-events:none;transition:.22s;z-index:20;padding:10px 14px;border-radius:999px;background:rgba(51,56,52,.92);color:white;font-size:11px;box-shadow:0 10px 30px rgba(0,0,0,.18)}
.toast.show{transform:translate(-50%,0);opacity:1}
@media(max-width:980px){.layout{grid-template-columns:1fr}.sidebar{grid-template-columns:1fr 1fr}.inventory-grid{grid-template-columns:repeat(6,minmax(68px,1fr));max-height:210px}}
@media(max-width:650px){.app{padding:8px}.topbar{align-items:flex-start}.status-pill{display:none}.sidebar{grid-template-columns:1fr}.brand h1{font-size:30px}.notebook-grid{grid-template-columns:repeat(3,1fr)}.mode-row{grid-template-columns:1fr}.placement-status{text-align:left;max-width:none}.colors{grid-template-columns:repeat(3,1fr)}.inventory-grid{grid-template-columns:repeat(4,minmax(64px,1fr));max-height:250px}.stage-info{left:7px;right:7px;top:7px}.stage-info p{display:none}.controls{bottom:8px}.btn{padding:9px 11px}}

/* Illustration-tool style workbench */
.layout{display:block;max-width:900px;margin:0 auto}
.workshop{padding:0 12px 12px}
.compact-head{padding-bottom:8px}
.workbench-shell{display:flex;align-items:flex-start;justify-content:center;gap:10px;padding:0 2px}
.tool-rail{width:62px;flex:0 0 62px;display:flex;flex-direction:column;align-items:center;gap:9px;padding:7px 6px;border:1px solid var(--line);border-radius:16px;background:rgba(247,247,243,.90);box-shadow:0 8px 20px rgba(45,49,45,.06)}
.tool-group{display:grid;gap:6px;width:100%}
.tool-btn{width:100%;min-height:53px;border:1px solid transparent;border-radius:12px;background:transparent;color:var(--muted);display:grid;place-items:center;gap:2px;padding:5px 3px;cursor:pointer;transition:.15s background,.15s color,.15s border-color,.15s transform}
.tool-btn:hover{background:#fff;color:var(--text);transform:translateY(-1px)}
.tool-btn.active{background:#fff;color:var(--text);border-color:var(--line-strong);box-shadow:0 4px 12px rgba(45,49,45,.08)}
.tool-btn svg{width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:1.65;stroke-linecap:round;stroke-linejoin:round}
.tool-btn span{font-size:9px;font-weight:700}
.tool-divider{width:34px;height:1px;background:var(--line)}
.brush-colors{display:grid;gap:7px}
.brush-color{position:relative;width:35px;height:35px;display:grid;place-items:center;cursor:pointer}
.brush-color input{position:absolute;inset:0;width:35px;height:35px;border:0;padding:0;background:none;border-radius:50%;overflow:hidden;cursor:pointer}
.brush-color input::-webkit-color-swatch-wrapper{padding:2px}
.brush-color input::-webkit-color-swatch{border:1px solid rgba(55,58,55,.20);border-radius:50%;box-shadow:0 2px 6px rgba(45,49,45,.09)}
.brush-color span{position:absolute;right:-2px;bottom:-2px;display:grid;place-items:center;width:15px;height:15px;border-radius:50%;background:#fff;border:1px solid var(--line-strong);font-size:8px;font-weight:800;color:var(--text);pointer-events:none}
.canvas-column{min-width:0;width:min(100%,600px)}
.canvas-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:48px;padding:8px 10px;margin-bottom:7px;border:1px solid var(--line);border-radius:14px;background:rgba(250,250,247,.82)}
.tool-status{display:grid;gap:2px;min-width:0}.tool-status strong{font-size:12px}.tool-status span{font-size:9px;color:var(--muted);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.canvas-wrap{width:min(100%,600px);max-width:600px;height:auto!important;aspect-ratio:1/1;margin:0 auto;border-radius:16px}
.canvas-foot{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:7px 2px 0}
.canvas-foot .placement-status{font-size:9px;text-align:left;max-width:190px;color:var(--text)}
.canvas-foot .microcopy{margin:0;text-align:right;max-width:360px}
.inventory{margin-top:11px}
.inventory-toolbar{padding:9px 11px 7px}
.inventory-help{font-size:9px;color:var(--muted);margin-left:auto}
.compact-action{font-size:9px;padding:7px 9px}
.inventory-grid{display:flex;grid-template-columns:none;gap:8px;max-height:none;overflow-x:auto;overflow-y:hidden;padding:2px 10px 10px;scrollbar-width:thin;scroll-snap-type:x proximity}
.inventory-slot{flex:0 0 66px;aspect-ratio:auto;min-height:78px;border:0;border-radius:14px;background:transparent;padding:4px 3px;display:grid;grid-template-rows:56px auto auto;align-items:start;justify-items:center;cursor:pointer;scroll-snap-align:start}
.inventory-slot:hover{transform:none;background:rgba(255,255,255,.52)}
.inventory-slot.armed{outline:none;background:rgba(255,255,255,.82)}
.inventory-slot.armed .inventory-icon{border-color:#636b66;box-shadow:0 0 0 3px rgba(99,107,102,.13),0 4px 12px rgba(45,49,45,.08)}
.inventory-icon{width:54px;height:54px;border:1px solid var(--line);border-radius:50%;background:rgba(255,255,255,.78);display:grid;place-items:center;position:relative;transition:.15s border-color,.15s box-shadow,.15s transform}
.inventory-slot:hover .inventory-icon{transform:scale(1.035);border-color:var(--line-strong)}
.inventory-stone{width:33px;height:28px}
.inventory-sample{width:46px;height:46px}
.inventory-name{width:64px;font-size:8px;margin-top:3px}
.inventory-meta{font-size:7px;margin-top:1px}
.inventory-empty{flex:1 0 250px;min-height:64px;display:grid;place-items:center}

.placed-material.sample .object{opacity:0;inset:0}
.placed-material.sample:hover .object{opacity:1;border:1px dashed rgba(90,95,90,.20);border-radius:50%}
.placed-material.sample .material-index{background:rgba(255,255,255,.76)}
@media(max-width:720px){
  .workbench-shell{flex-direction:column;align-items:stretch}
  .tool-rail{width:100%;flex:0 0 auto;flex-direction:row;justify-content:flex-start;padding:6px}
  .tool-group{display:flex;width:auto}.tool-btn{width:58px;min-height:48px}
  .tool-divider{width:1px;height:34px}
  .brush-colors{display:flex}.canvas-column{width:100%;max-width:600px;margin:0 auto}
  .canvas-foot{display:grid}.canvas-foot .placement-status,.canvas-foot .microcopy{max-width:none;text-align:left}
  .inventory-grid{display:flex}
}
@media(max-width:480px){
  .app{padding:7px}.card-head{padding-left:11px;padding-right:11px}
  .canvas-toolbar{min-height:42px}.tool-status span{display:none}
  .canvas-wrap{max-width:520px}.inventory-grid{display:flex}
  .inventory-help{display:none}.compact-action{padding:6px 7px}
}


/* Canvas/content alignment and material preset strip */
.canvas-wrap canvas,.ingredient-layer,.canvas-empty{inset:0;width:100%;height:100%}
.inventory-grid{display:flex!important;grid-template-columns:none!important;overflow-x:auto!important;overflow-y:hidden!important;max-height:none!important}
.inventory-slot{flex:0 0 66px!important;min-width:66px!important}
@media(max-width:650px){.inventory-grid{display:flex!important}.inventory-slot{flex-basis:62px!important;min-width:62px!important}.inventory-name{width:60px}}



/* Fixed single-screen workbench */
html,body{height:100%;overflow:hidden}
body{min-height:100dvh}
.app{height:100dvh;max-width:1440px;padding:8px 12px;display:grid;grid-template-rows:auto minmax(0,1fr);overflow:hidden}
.topbar{min-height:52px;padding:2px 4px 7px;align-items:center}
.brand h1{font-size:clamp(25px,3vw,36px);line-height:1;letter-spacing:.14em}
.brand p{font-size:10px;margin-top:3px}
.status-pill{padding:6px 10px;font-size:10px}
.layout{display:block;min-height:0;height:100%;max-width:none;margin:0}
.card.workshop{height:100%;padding:8px;overflow:hidden;border-radius:18px}
.workbench-shell{height:100%;display:grid;grid-template-columns:58px minmax(320px,1fr) 194px;gap:9px;align-items:center;justify-content:center;padding:0}
.tool-rail{width:58px;height:max-content;max-height:100%;padding:6px 5px;gap:7px;border-radius:14px}
.tool-btn{min-height:48px;padding:4px 2px}.tool-btn svg{width:21px;height:21px}.tool-btn span{font-size:8px}
.tool-divider{width:30px}.brush-colors{gap:5px}.brush-color,.brush-color input{width:31px;height:31px}
.canvas-column{width:min(100%, calc(100dvh - 130px), calc(100vw - 310px), 580px);max-width:580px;min-width:0;align-self:center}
.canvas-toolbar{height:43px;min-height:43px;padding:6px 9px;margin-bottom:6px;border-radius:12px}
.tool-status strong{font-size:11px}.tool-status span{font-size:8px}.step-badge{padding:4px 7px;font-size:9px}
.canvas-wrap{width:100%;max-width:none;height:auto!important;aspect-ratio:1/1;border-radius:13px;margin:0;contain:layout paint size}
.canvas-wrap canvas{display:block;position:absolute;left:0;top:0;width:100%;height:100%;touch-action:none}
.controls{bottom:8px;padding:4px;border-radius:12px}.btn{padding:8px 10px;border-radius:10px;font-size:10px}
.canvas-foot{display:none!important}

/* CSP-like compact material dab palette */
.material-palette{height:min(100%,680px);min-height:0;align-self:center;display:grid;grid-template-rows:auto auto minmax(0,1fr) auto;gap:8px;padding:9px;border:1px solid var(--line);border-radius:15px;background:rgba(247,247,244,.92);box-shadow:0 8px 22px rgba(45,49,45,.06);overflow:hidden}
.material-palette-head{display:flex;align-items:center;justify-content:space-between;gap:6px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.material-palette-head>div{display:grid;gap:1px}.material-palette-head strong{font-size:12px}.material-palette-head .inventory-count{font-size:8px}
.compact-action{font-size:8px;padding:5px 6px!important}
.selected-material{display:flex;align-items:center;gap:8px;min-height:42px;padding:6px 7px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.68)}
.selected-material-dab{width:27px;height:27px;flex:0 0 27px;border-radius:50%;background:#d7d9d4;border:1px solid #bfc2bc;box-shadow:inset -4px -5px 7px rgba(55,60,55,.10)}
.selected-material div{display:grid;gap:0;min-width:0}.selected-material small{font-size:7px;color:var(--muted)}.selected-material strong{font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inventory-grid{display:grid!important;grid-template-columns:repeat(4,36px)!important;align-content:start;justify-content:center;gap:5px!important;min-height:0;max-height:none!important;padding:3px!important;overflow-y:auto!important;overflow-x:hidden!important;scrollbar-width:thin;scroll-snap-type:none!important}

.inventory-slot:hover{background:rgba(255,255,255,.76)!important;border-color:var(--line)!important;transform:none!important}

<script>
(() => {
  'use strict';

  const $ = id => document.getElementById(id);
  const canvas = $('sigilCanvas');
  const ctx = canvas.getContext('2d');
  const wrap = $('canvasWrap');
  const ingredientLayer = $('ingredientLayer');
  const STORAGE_KEY = 'alchemy_arty_workbench_v3';
  const defaultColors = ['#557f92','#b26f60','#84965e','#7c7191','#a58b55'];
  const LEVEL_TABLE = [
    {level:1,min:0,glyphs:1},
    {level:2,min:2,glyphs:2},
    {level:3,min:5,glyphs:3},
    {level:4,min:9,glyphs:4},
    {level:5,min:14,glyphs:5}
  ];
  const GLYPH_SHAPES = ['circle','triangle','inverted','square','line'];
  const MAX_PLACED = 6;

  let dpr = 1;
  let logicalWidth = 1;
  let logicalHeight = 1;
  let drawing = false;
  let currentPoints = [];
  let strokeStartedAt = 0;
  let ritual = null;
  let toastTimer = null;
  let animationFrame = 0;
  let dragPlacedUid = null;

  const state = loadState();
  state.strokes = [];
  state.placed = [];
  state.mode = 'place';
  state.armedMaterial = null;
  state.displayResult = !!state.current;
  state.colors = Array.isArray(state.colors) ? state.colors.slice(0,5) : defaultColors.slice();
  while(state.colors.length<5)state.colors.push(defaultColors[state.colors.length]);
  state.glyphBook = state.glyphBook && typeof state.glyphBook==='object' ? state.glyphBook : {};
  state.mode = state.displayResult ? 'result' : 'place';

  function normalizeMaterialRecord(raw){
    const m=raw && typeof raw==='object' ? raw : {};
    const lc=(v,min=0,max=100)=>Math.max(min,Math.min(max,v));
    const validHex=v=>typeof v==='string'&&/^#[0-9a-f]{6}$/i.test(v);
    const hexRgb=hex=>{const n=parseInt(hex.slice(1),16);return{r:(n>>16)&255,g:(n>>8)&255,b:n&255}};
    const rgbHex=(r,g,b)=>'#'+[r,g,b].map(v=>Math.round(lc(v,0,255)).toString(16).padStart(2,'0')).join('');
    const mix=(a,b,t)=>{const A=hexRgb(a),B=hexRgb(b);return rgbHex(A.r+(B.r-A.r)*t,A.g+(B.g-A.g)*t,A.b+(B.b-A.b)*t)};
    const palette=base=>[mix(base,'#ffffff',.62),mix(base,'#ffffff',.12),mix(base,'#303330',.28)];
    const base=(Array.isArray(m.sourceColors)?m.sourceColors:Array.isArray(m.colors)?m.colors:defaultColors).slice(0,5);
    while(base.length<5)base.push(defaultColors[base.length]);
    m.sourceColors=base.map((v,i)=>validHex(v)?v:defaultColors[i]);
    const dominant=Number.isFinite(+m.dominantColorIndex)?lc(Math.round(+m.dominantColorIndex),0,4):0;
    m.dominantColorIndex=dominant;
    m.colors=palette(m.sourceColors[dominant]);
    m.depth=lc(Number.isFinite(+m.depth)?Math.round(+m.depth):1,1,20);
    m.seed=Number.isFinite(+m.seed)?+m.seed:Math.random()*1000;
    m.stats=m.stats&&typeof m.stats==='object'?m.stats:{};
    const keys=['mineral','liquid','organic','gas','light','heat','growth','circulation','absorption','transmission','regeneration','division','transformation','stability','purity','autonomy','memory','symmetry','containment','branching','group','density'];
    keys.forEach(k=>m.stats[k]=lc(Number.isFinite(+m.stats[k])?+m.stats[k]:0,0,100));
    const allowed=new Set(['circle','triangle','inverted','square','line','unknown']);
    m.strokeSummary=(Array.isArray(m.strokeSummary)?m.strokeSummary:[]).slice(0,5).map(s=>{
      s=s&&typeof s==='object'?s:{};
      const rawSize=Number.isFinite(+s.size)?+s.size:35;
      const center=s.center&&typeof s.center==='object'?s.center:{x:.5,y:.5};
      const fixCoord=v=>{v=Number.isFinite(+v)?+v:.5;return v>1?lc(v/600,0,1):lc(v,0,1)};

  function inferFamilyFromSignature(sig,flags={},stats={}){
    const set=new Set(sig.split(''));
    if(flags.selfMaintaining&&set.has('C')&&set.has('L')&&sig.length>=3)return'生物状';
    if(set.size===1){
      if(set.has('C'))return'水状';
      if(set.has('T'))return'発光体';
      if(set.has('I'))return'鉱石';
      if(set.has('S'))return'石質';
      if(set.has('L'))return'気体状';
    }
    if(set.has('L')&&(set.has('C')||set.has('T')||set.has('I')))return'植物状';
    if((set.has('I')||set.has('S'))&&(set.has('T')||set.has('I')||set.has('S'))&&!set.has('L'))return'鉱石';
    if(set.has('T')&&!set.has('L'))return'発光体';
    if(set.has('C')&&!set.has('L')&&!set.has('T'))return'水状';
    return familyFromStats(stats,flags);
  }

  function generatedCategoryName(sig,family){
    const counts={};
    sig.split('').forEach(c=>counts[c]=(counts[c]||0)+1);
    const order=['C','T','I','S','L'];
    const countLabel={2:'双',3:'三',4:'四',5:'五'};
    const parts=order.filter(c=>counts[c]).map(c=>`${countLabel[counts[c]]||''}${shapeToken(c)}`);

    return `${family}・${parts.join('')}${suffix}`;
  }

    if(CATEGORY_SIGNATURE_MAP[multiset])return CATEGORY_SIGNATURE_MAP[multiset];

    return{name:generatedCategoryName(multiset,family),family,rare:false};

  function shapeContribution(shape,role){

  function shapeContributionForCount(shape,index,count){

  function colorContribution(hex){
    const hsl=hexToHsl(hex),s=emptyStats(),h=hsl.h;
    if(h<25||h>=345){s.heat+=24;s.transformation+=17;}
    else if(h<65){s.light+=25;s.transformation+=10;}
    else if(h<155){s.growth+=25;s.regeneration+=16;s.organic+=12;}
    else if(h<205){s.liquid+=22;s.circulation+=16;s.transmission+=9;}
    else if(h<255){s.liquid+=12;s.stability+=18;s.purity+=10;}
    else if(h<315){s.memory+=19;s.transmission+=13;s.light+=8;}
    else{s.organic+=15;s.regeneration+=10;s.heat+=7;}

    const r=stageRect();

    const oldWidth=logicalWidth,oldHeight=logicalHeight;
    if(oldWidth>2&&oldHeight>2&&(Math.abs(width-oldWidth)>1||Math.abs(height-oldHeight)>1)){
      const sx=width/oldWidth,sy=height/oldHeight;
      state.strokes.forEach(stroke=>stroke.points.forEach(p=>{p.x*=sx;p.y*=sy;}));
      currentPoints.forEach(p=>{p.x*=sx;p.y*=sy;});
    }
    logicalWidth=width;logicalHeight=height;
    dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));
    const nextWidth=Math.max(1,Math.round(width*dpr)),nextHeight=Math.max(1,Math.round(height*dpr));
    if(canvas.width!==nextWidth||canvas.height!==nextHeight){canvas.width=nextWidth;canvas.height=nextHeight;}
    ctx.setTransform(dpr,0,0,dpr,0,0);
    drawScene(performance.now());

  function samplePreviewSvg(m,compact=false){
    const summaries=Array.isArray(m?.strokeSummary)?m.strokeSummary:[];
    const primary=summaries[m?.dominantColorIndex||0]||summaries[0]||{shape:'circle',size:36,precision:60,center:{x:.5,y:.5}};
    const colors=(m?.colors&&m.colors.length>=3)?m.colors:['#ecebe7','#b9bbb5','#858b85'];
    const seed=Number(m?.seed)||0;
    const avgSize=summaries.length?avg(summaries.map(v=>v.size||35)):35;
    const r=14+Math.min(7,avgSize*.10)+(m?.depth||1)*.45;
    const cx=32,cy=32;
    const waveCount=2+Math.round((m?.stats?.symmetry||50)/28);
    const body=[];
    for(let i=0;i<24;i++){
      const a=i*Math.PI*2/24;

  function createMaterial(stats,flags,colors,depth,parents,strokes,spatial,placement,sourceColors,dominance){

  const traitMap={mineral:'鉱物性',liquid:'流動性',organic:'有機性',gas:'気相性',light:'発光性',heat:'熱性',growth:'伸長性',circulation:'循環性',absorption:'吸収性',transmission:'伝達性',regeneration:'再構成',division:'分離性',transformation:'変換性',stability:'安定性',purity:'均質性',autonomy:'自発性',memory:'履歴保持',symmetry:'対称性',containment:'内包性',branching:'分岐性',group:'群集性',density:'高密度'};

  function buildObservations(stats,flags,parents){
    const obs=[];if(stats.transformation>55)obs.push('接触した石の表面組成が局所的に変化した。');if(stats.circulation>50)obs.push('内部で周期的な移動と収縮を確認した。');if(stats.growth>50)obs.push('静置後、外縁部の構造がわずかに伸長した。');if(stats.regeneration>52)obs.push('欠損部周辺で再配置反応が起きている。');if(stats.memory>48)obs.push('同一刺激への二回目の反応時間が短縮した。');if(stats.absorption>55)obs.push('近傍の微粒子が選択的に取り込まれた。');if(stats.group>55)obs.push('複数の小構造が離れた位置で同期した。');
    if(flags.transmutativeCore){obs.push('反応後も触媒量の明確な減少を確認できない。','分解処理後、元の密度へ戻ろうとする挙動を示した。');}if(flags.selfMaintaining){obs.push('外部入力停止後も内部循環が継続した。','取り込んだ物質を損傷部へ再配置した。');}if(flags.worldGrowth)obs.push('周囲の床面に沿って分岐構造が広がり始めた。');if(flags.darkCenter)obs.push('周囲の光量と彩度が局所的に低下した。');if(flags.closedWorld)obs.push('外殻内部で異なる状態の物質が循環している。');if(flags.memoryPattern)obs.push('過去の紋様に似た軌跡を自発的に形成した。');if(flags.collective)obs.push('一部を除去すると別の構造が同じ役割を引き継いだ。');if(flags.anthropic)obs.push('作成者の接近時にのみ、対称構造の向きが変化した。');if(parents.length)obs.push(`${parents.length}種の既存試料に由来する性質が検出された。`);if(obs.length<3)obs.push('表面は安定しているが、内部密度が一定していない。','温度変化に応じて外形が緩やかに変化する。');return[...new Set(obs)].slice(0,8);
  }

  function startRitual(onComplete){
    const start=performance.now(),duration=1450;ritual={angles:Array.from({length:state.strokes.length},()=>0),rotation:0,alpha:.8,flash:0};
    function tick(now){const t=Math.min(1,(now-start)/duration),ease=1-Math.pow(1-t,4);ritual.angles=state.strokes.map((_,i)=>ease*Math.PI*2*(i+1)*(i%2?-1:1));ritual.rotation=ease*Math.PI*2;ritual.alpha=.68+t*.16;ritual.flash=t>.78?Math.sin(((t-.78)/.22)*Math.PI):0;drawScene(now);if(t<1)requestAnimationFrame(tick);else{ritual=null;onComplete();}}

  }

    const slots=[`<div class="inventory-slot ${state.armedMaterial==='stone'?'armed':''}" style="--dab-size:21px;--category-color:${categoryColor('石')}" draggable="true" data-material-key="stone" title="原基石（無限）"><span class="inventory-category-dot"></span><div class="inventory-icon"><div class="inventory-stone"></div></div><div class="inventory-name">原基石</div><div class="inventory-meta">∞</div></div>`];

  function escapeHtml(v){return String(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
  function showToast(text){const t=$('toast');t.textContent=text;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1800);}

  function materialGradient(context,m,x,y,r){const g=context.createRadialGradient(x-r*.3,y-r*.35,2,x,y,r);g.addColorStop(0,rgba(m.colors[0],.92));g.addColorStop(.55,rgba(m.colors[1],.88));g.addColorStop(1,rgba(m.colors[2],.88));return g;}

  function drawGeneratedResult(m,w,h,t,overrideOrigin=null,sizeScale=1,opacity=1){
    m=normalizeMaterialRecord(m);const origin=overrideOrigin||m.placement?.origin||{x:.5,y:.5},cx=clamp(origin.x,0,1)*w,cy=clamp(origin.y,0,1)*h,s=m.stats,avgSize=clamp(avg((m.strokeSummary||[]).map(v=>clamp(v.size||35,6,100))),6,100),rawBase=(24+avgSize*.32+m.depth*3.5)*sizeScale,maxBase=overrideOrigin?Math.min(w,h)*.075:Math.min(w,h)*.22,base=clamp(rawBase,8,maxBase),moveLevel=m.depth>=2?Math.min(1,(m.depth-1)*.22+s.autonomy/130):0;

    const halo=ctx.createRadialGradient(cx,cy,4,cx,cy,base*2.5);halo.addColorStop(0,rgba(blendColors(m.colors),.07));halo.addColorStop(1,rgba(m.colors[0],0));ctx.fillStyle=halo;ctx.beginPath();ctx.arc(cx,cy,base*2.5,0,Math.PI*2);ctx.fill();
    if(m.flags?.darkCenter){ctx.fillStyle='rgba(40,43,42,.08)';ctx.beginPath();ctx.arc(cx,cy,base*1.7,0,Math.PI*2);ctx.fill();}

    const summaries=m.strokeSummary||[];
    drawCoreBody(m,cx,cy,base,t,moveLevel);
    drawPrimarySilhouette(m,cx,cy,base,t,moveLevel);
    summaries.forEach((summary,i)=>drawStructuralMotif(m,summary,i,cx,cy,base,t,moveLevel));
    drawParentResidues(m,cx,cy,base,t,moveLevel);

    if(m.flags?.selfMaintaining){const pulse=1+Math.sin(t*2.2+m.seed)*.06;ctx.strokeStyle=rgba(m.colors[1],.28);ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,cy,base*1.28*pulse,0,Math.PI*2);ctx.stroke();}
    if(m.flags?.memoryPattern){ctx.strokeStyle=rgba(m.colors[2],.20);ctx.lineWidth=.8;for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(cx,cy,base*(1.42+i*.17),t*.06+i,Math.PI*1.05+t*.06+i);ctx.stroke();}}

  }

  function drawCoreBody(m,cx,cy,r,t,motion){
    const s=m.stats,family=categoryFamily(m.category),phase=t*.22+m.seed,breath=1+Math.sin(t*(.4+s.circulation/80)+m.seed)*.025*motion;
    ctx.save();ctx.translate(cx,cy);ctx.rotate(Math.sin(t*.16+m.seed)*.08*motion);ctx.fillStyle=materialGradient(ctx,m,0,0,r*1.55);ctx.strokeStyle=rgba(m.colors[2],.34);ctx.lineWidth=.9;
    if(family==='水状'){
      ctx.beginPath();for(let i=0;i<28;i++){const a=i*Math.PI*2/28,w=Math.sin(a*4+phase)*.08,rr=r*breath*(1.02+w),x=Math.cos(a)*rr,y=Math.sin(a)*rr*(1.18+Math.cos(a+phase)*.08);i?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.closePath();ctx.fill();ctx.stroke();
    }else if(family==='石質'){
      const q=r*1.08;ctx.beginPath();for(let i=0;i<4;i++){const a=Math.PI/4+i*Math.PI/2,x=Math.cos(a)*q,y=Math.sin(a)*q;i?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.closePath();ctx.fill();ctx.stroke();
    }else if(family==='鉱石'){
      ctx.beginPath();for(let i=0;i<6;i++){const a=-Math.PI/2+i*Math.PI*2/6,rr=r*(i%2?1.24:.78),x=Math.cos(a)*rr,y=Math.sin(a)*rr;i?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.closePath();ctx.fill();ctx.stroke();
    }else if(family==='気体状'){
      ctx.globalAlpha*=.72;for(let i=0;i<4;i++){ctx.beginPath();ctx.ellipse(Math.cos(phase+i)*r*.26,Math.sin(phase*.8+i)*r*.16,r*(.62+i*.08),r*(.34+i*.05),phase*.3+i,0,Math.PI*2);ctx.fill();}ctx.globalAlpha/=.72;
    }else if(family==='発光体'){
      ctx.beginPath();ctx.arc(0,0,r*.82,0,Math.PI*2);ctx.fill();ctx.stroke();
    }else if(family==='植物状'){
      ctx.beginPath();ctx.ellipse(0,0,r*.78,r*1.12,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    }else if(family==='生物状'){
      ctx.beginPath();ctx.moveTo(0,-r*1.12);ctx.bezierCurveTo(r*.92,-r*.72,r*.74,r*.88,0,r*1.12);ctx.bezierCurveTo(-r*.74,r*.88,-r*.92,-r*.72,0,-r*1.12);ctx.closePath();ctx.fill();ctx.stroke();
    }else if(family==='秘奥'){
      ctx.beginPath();for(let i=0;i<5;i++){const a=-Math.PI/2+i*Math.PI*2/5,x=Math.cos(a)*r*.95,y=Math.sin(a)*r*.95;i?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.closePath();ctx.fill();ctx.stroke();
    }else{
      const points=20,waveCount=2+Math.round(s.symmetry/25);ctx.beginPath();for(let i=0;i<points;i++){const a=i*Math.PI*2/points,wave=Math.sin(a*waveCount+phase)*(.045+s.transformation/1200),rr=r*breath*(1+wave),x=Math.cos(a)*rr,y=Math.sin(a)*rr*(.92+s.liquid/620);i?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.closePath();ctx.fill();ctx.stroke();
    }
    ctx.restore();
  }

  function drawPrimarySilhouette(m,cx,cy,r,t,motion){
    const family=categoryFamily(m.category),phase=t*.18+m.seed,accent=m.colors[2];
    ctx.save();ctx.translate(cx,cy);ctx.rotate(Math.sin(phase)*.06*motion);ctx.strokeStyle=rgba(accent,.30);ctx.fillStyle=rgba(m.colors[0],.16);ctx.lineWidth=1.15;
    if(family==='水状'){
      for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(0,0,r*(.55+i*.24),phase*.22+i*.6,phase*.22+Math.PI*.9+i*.6);ctx.stroke();}
    }else if(family==='石質'){
      for(let i=0;i<3;i++){const q=r*(.62+i*.2);ctx.beginPath();for(let k=0;k<4;k++){const a=Math.PI/4+k*Math.PI/2,x=Math.cos(a)*q,y=Math.sin(a)*q;k?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.closePath();ctx.stroke();}
    }else if(family==='鉱石'){
      const spikes=5+Math.round((m.depth||1)/2);for(let i=0;i<spikes;i++){const a=-Math.PI/2+i*Math.PI*2/spikes;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*r*1.34,Math.sin(a)*r*1.34);ctx.stroke();}
    }else if(family==='気体状'){
      for(let i=0;i<4;i++){const y=(i-1.5)*r*.2;ctx.beginPath();ctx.moveTo(-r*1.25,y);ctx.bezierCurveTo(-r*.45,y+Math.sin(phase+i)*r*.42,r*.45,y-Math.sin(phase+i)*r*.42,r*1.25,y);ctx.stroke();}
    }else if(family==='発光体'){
      for(let i=0;i<8;i++){const a=i*Math.PI*2/8+phase*.2;ctx.beginPath();ctx.moveTo(Math.cos(a)*r*.9,Math.sin(a)*r*.9);ctx.lineTo(Math.cos(a)*r*1.48,Math.sin(a)*r*1.48);ctx.stroke();}
    }else if(family==='植物状'){
      ctx.beginPath();ctx.moveTo(0,r*.2);ctx.lineTo(0,-r*1.18);ctx.stroke();
      for(let i=0;i<4;i++){const dir=i%2?1:-1,yy=-r*.2-i*r*.22;ctx.beginPath();ctx.ellipse(dir*r*.36,yy,r*.34,r*.15,dir*.65,0,Math.PI*2);ctx.stroke();}
    }else if(family==='生物状'){
      ctx.beginPath();ctx.moveTo(0,-r*.82);ctx.lineTo(0,r*.82);ctx.stroke();
      for(let i=0;i<3;i++){const yy=-r*.38+i*r*.38;ctx.beginPath();ctx.moveTo(-r*.28,yy);ctx.quadraticCurveTo(-r*.74,yy-r*.18,-r*.9,yy+r*.12);ctx.moveTo(r*.28,yy);ctx.quadraticCurveTo(r*.74,yy-r*.18,r*.9,yy+r*.12);ctx.stroke();}
      ctx.fillStyle=rgba(m.colors[2],.35);ctx.beginPath();ctx.arc(-r*.18,-r*.22,2.2,0,Math.PI*2);ctx.arc(r*.18,-r*.22,2.2,0,Math.PI*2);ctx.fill();
    }else if(family==='秘奥'){
      for(let i=0;i<5;i++){const a=-Math.PI/2+i*Math.PI*2/5;ctx.beginPath();ctx.moveTo(Math.cos(a)*r*.42,Math.sin(a)*r*.42);ctx.lineTo(Math.cos(a)*r*1.48,Math.sin(a)*r*1.48);ctx.stroke();}
      ctx.beginPath();ctx.arc(0,0,r*1.24,0,Math.PI*2);ctx.stroke();
    }else{
      ctx.beginPath();ctx.arc(0,0,r*1.05,0,Math.PI*2);ctx.stroke();
    }
    ctx.restore();
  }

  function drawStructuralMotif(m,summary,index,cx,cy,r,t,motion){
    const center=summary.center||{x:.5,y:.5},ox=(center.x-.5)*r*1.25,oy=(center.y-.5)*r*1.25,scale=.45+(summary.size||35)/120,color=m.colors[index%3],phase=t*(.12+.12*motion)+index*2.1+m.seed;
    ctx.save();ctx.translate(cx+ox,cy+oy);ctx.rotate(Math.sin(phase)*.12*motion+index*.35);ctx.strokeStyle=rgba(color,.50);ctx.fillStyle=rgba(color,.20);ctx.lineWidth=.9;
    if(summary.shape==='circle'){
      ctx.beginPath();ctx.ellipse(0,0,r*scale,r*scale*.72,Math.sin(phase)*.12,0,Math.PI*2);ctx.stroke();
      for(let j=0;j<3;j++){const a=j*Math.PI*2/3+phase*.3,rr=r*scale*.54;ctx.beginPath();ctx.arc(Math.cos(a)*rr,Math.sin(a)*rr*.7,1.8+j*.5,0,Math.PI*2);ctx.fill();}
    }else if(summary.shape==='triangle'||summary.shape==='inverted'){
      const dir=summary.shape==='inverted'?1:-1;for(let j=0;j<3;j++){const a=(j-1)*.48+dir*Math.PI/2,tip=r*scale*(.85+j*.08);ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(Math.cos(a+.5)*tip*.45,Math.sin(a+.5)*tip*.45,Math.cos(a)*tip,Math.sin(a)*tip);ctx.stroke();}
    }else if(summary.shape==='square'){
      const layers=2+Math.round(m.stats.density/45);for(let j=0;j<layers;j++){const q=r*scale*(.45+j*.22);ctx.beginPath();for(let k=0;k<4;k++){const a=Math.PI/4+k*Math.PI/2,x=Math.cos(a)*q,y=Math.sin(a)*q;k?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.closePath();ctx.stroke();}
    }else{
      const strands=2+Math.round(m.stats.transmission/35);for(let j=0;j<strands;j++){ctx.beginPath();ctx.moveTo(-r*scale,(-strands/2+j)*3);ctx.bezierCurveTo(-r*scale*.25,Math.sin(phase+j)*r*.25,r*scale*.3,-Math.sin(phase+j)*r*.25,r*scale,0);ctx.stroke();}
    }
    ctx.restore();
  }

  function drawParentResidues(m,cx,cy,r,t,motion){
    const count=Math.min(6,(m.parents||[]).length*2+(m.depth>1?1:0));
    for(let i=0;i<count;i++){const a=i*Math.PI*2/Math.max(1,count)+t*.08*motion,rr=r*(1.15+(i%2)*.24),x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr*.76;ctx.fillStyle=rgba(m.colors[1],.30);ctx.strokeStyle=rgba(m.colors[2],.18);ctx.beginPath();ctx.arc(x,y,2.2+(i%3),0,Math.PI*2);ctx.fill();}
  }

  function clearData(){
    if(!window.confirm('保存した試料と研究記録を初期化しますか？'))return;
    localStorage.removeItem(STORAGE_KEY);
    state.inventory=[];state.current=null;state.synthesisCount=0;state.strokes=[];state.placed=[];
    state.armedMaterial=null;state.displayResult=false;currentPoints=[];ritual=null;
    state.colors=defaultColors.slice();state.glyphBook={};
    ['color1','color2','color3','color4','color5'].forEach((id,i)=>{const input=$(id);if(input)input.value=state.colors[i];});
    setMode('place');renderInventory();renderPlaced();renderGlyphBook();renderLevelUI();updateStep();resizeCanvas();showToast('研究記録を初期化しました');
  }

  $('synthesizeBtn').addEventListener('click',synthesize);
  $('newSynthesisBtn').addEventListener('click',newSynthesis);
  $('clearDataBtn').addEventListener('click',clearData);
  ['color1','color2','color3','color4','color5'].forEach((id,i)=>{const input=$(id);input.value=state.colors[i];input.addEventListener('input',()=>{state.colors[i]=input.value;if(state.strokes[i])state.strokes[i].color=input.value;saveState();drawScene(performance.now());});});
  window.addEventListener('resize',resizeCanvas);
  if('ResizeObserver' in window){new ResizeObserver(()=>resizeCanvas()).observe(wrap);}

  renderInventory();renderPlaced();renderGlyphBook();renderLevelUI();setMode(state.displayResult?'result':'place');requestAnimationFrame(resizeCanvas);animationFrame=requestAnimationFrame(animate);
})();
</script>
</body>
</html>
